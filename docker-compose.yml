services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse123
      POSTGRES_DB: the_pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d the_pulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev_password@db:5432/the_pulse
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in your shell or .env}
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_NAME: The Pulse
    ports:
      - "3000:3000"

volumes:
  pulse_pgdata:
